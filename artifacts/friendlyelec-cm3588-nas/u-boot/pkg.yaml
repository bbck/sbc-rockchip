# References:
#   U-Boot:
#     - https://u-boot.readthedocs.io/en/latest
name: u-boot-friendlyelec-cm3588-nas
variant: scratch
shell: /toolchain/bin/bash
dependencies:
  - stage: base
  - stage: arm-trusted-firmware-rk3588
  - stage: rkbin-rk3588
    platform: linux/amd64

steps:
  - sources:
      - url: https://ftp.denx.de/pub/u-boot/u-boot-{{ .uboot_rk3588_version }}.tar.bz2
        destination: u-boot.tar.bz2
        sha256: "{{ .uboot_rk3588_sha256 }}"
        sha512: "{{ .uboot_rk3588_sha512 }}"
    env:
      SOURCE_DATE_EPOCH: {{ .BUILD_ARG_SOURCE_DATE_EPOCH }}
    prepare:
      # friendlyelec-cm3588-nas
      - |
        mkdir -p /usr/bin \
          && ln -sf /toolchain/bin/env /usr/bin/env \
          && ln -sf /toolchain/bin/python3 /toolchain/bin/python

        pip3 install pyelftools setuptools

        tar xf u-boot.tar.bz2 --strip-components=1
      - |
        make cm3588-nas-rk3588_defconfig
    build:
      - |
        make -j $(nproc) HOSTLDLIBS_mkimage="-lssl -lcrypto" BL31=/libs/arm-trusted-firmware/rk3588/bl31.elf ROCKCHIP_TPL=/libs/rkbin/rk3588_ddr_lp4_2112MHz_lp5_2400MHz_v1.18.bin
    install:
      - |
        mkdir -p /rootfs/artifacts/arm64/u-boot/friendlyelec-cm3588-nas
        cp u-boot-rockchip.bin /rootfs/artifacts/arm64/u-boot/friendlyelec-cm3588-nas
finalize:
  - from: /rootfs
    to: /rootfs
